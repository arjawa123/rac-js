name: Android CI/CD Build APK

on:
  push:
    branches: [ "main", "develop" ]
    tags:
      - 'v*' # Trigger build & release saat push tag (cth: v1.0.0)
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: write # Diperlukan untuk membuat halaman Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Lakukan build Debug untuk artifact internal
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # Lakukan build Release untuk dipublish ke GitHub Release
    - name: Build Release APK (Unsigned)
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Debug Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') # Hanya jalankan jika ada TAG
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        body: |
          ✅ **RAC-JS Android Remote Client**
          
          Build otomatis oleh GitHub Actions.
          - `app-debug.apk` (Cocok untuk testing)
          - `app-release-unsigned.apk` (Unsigned, butuh di-sign manual)
        token: ${{ secrets.GITHUB_TOKEN }}

