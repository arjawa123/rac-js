name: Android CI/CD Build APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Gunakan Java 21 untuk Gradle 9.x agar lebih kompatibel
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Tambahkan --no-daemon dan --stacktrace untuk melihat detail jika gagal lagi
    # Serta membatasi memori agar tidak crash di server GitHub
    - name: Build with Gradle (Debug APK)
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
