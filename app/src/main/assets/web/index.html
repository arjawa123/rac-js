<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAC-JS Local Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0a0f1e; color: #cbd5e1; font-family: 'Inter', sans-serif; }
        .card { background-color: #161e2d; border: 1px solid #1e293b; border-radius: 1rem; }
        .terminal-bg { background-color: #050505; border: 1px solid #334155; }
        .terminal-text { font-family: 'Fira Code', 'Courier New', monospace; color: #10b981; }
        .terminal-prompt { color: #6366f1; font-weight: bold; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #161e2d; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type="file"]::file-selector-button {
            background-color: #1e293b; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer;
        }
    </style>
</head>
<body x-data="app()" x-init="init()" class="min-h-screen pb-12">
    <div class="max-w-5xl mx-auto px-4 pt-6">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-white tracking-tight flex items-center">
                    <span class="bg-indigo-600 text-white px-2 py-1 rounded mr-3 text-sm">JS</span>
                    RAC-JS <span class="text-indigo-500 ml-2">DIRECT</span>
                </h1>
                <p class="text-slate-500 text-sm mt-1">Direct Access & Monitoring (IPv6 Enabled)</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-900/50 p-2 rounded-lg border border-slate-800">
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs font-bold text-slate-300" x-text="deviceInfo.model || 'Loading...'"></span>
            </div>
        </div>

        <!-- QUICK STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 flex items-center gap-4">
                <div class="bg-indigo-500/10 p-3 rounded-lg text-indigo-400">🔋</div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-500">Baterai</p>
                    <p class="text-lg font-bold text-white" x-text="battery + '%'"></p>
                </div>
            </div>
            <div class="card p-4 flex items-center gap-4">
                <div class="bg-emerald-500/10 p-3 rounded-lg text-emerald-400">📱</div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-500">Android</p>
                    <p class="text-lg font-bold text-white" x-text="deviceInfo.android_version || '-'"></p>
                </div>
            </div>
            <button @click="exec('torch', 'toggle')" class="card p-4 flex items-center gap-4 hover:bg-slate-800 transition-all text-left">
                <div class="bg-yellow-500/10 p-3 rounded-lg text-yellow-400">🔦</div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-500">Flashlight</p>
                    <p class="text-lg font-bold text-white">Toggle</p>
                </div>
            </button>
            <button @click="exec('vibrate', '2')" class="card p-4 flex items-center gap-4 hover:bg-slate-800 transition-all text-left">
                <div class="bg-pink-500/10 p-3 rounded-lg text-pink-400">📳</div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-500">Vibrate</p>
                    <p class="text-lg font-bold text-white">2 Sec</p>
                </div>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- LEFT COLUMN: Terminal -->
            <div class="lg:col-span-7 flex flex-col gap-6">
                <div class="card overflow-hidden flex flex-col shadow-2xl">
                    <div class="bg-slate-800/50 px-4 py-2 border-b border-slate-700 flex justify-between items-center">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                        </div>
                        <span class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">Interactive Terminal</span>
                        <button @click="terminalLines = []" class="text-[10px] text-slate-500 hover:text-white transition-colors">CLEAR</button>
                    </div>
                    <div class="terminal-bg p-4 h-80 overflow-y-auto terminal-text text-sm custom-scrollbar" x-ref="termContainer">
                        <div class="mb-2 text-slate-500"># RAC-JS Shell v2.0 - Connected to <span x-text="deviceInfo.model"></span></div>
                        <template x-for="line in terminalLines">
                            <div class="mb-1 break-all">
                                <template x-if="line.type === 'input'">
                                    <span class="terminal-prompt">root@android:~$ </span>
                                </template>
                                <span :class="line.type === 'error' ? 'text-red-400' : ''" x-text="line.text"></span>
                            </div>
                        </template>
                        <div class="flex items-center mt-2">
                            <span class="terminal-prompt mr-2">root@android:~$ </span>
                            <input type="text" x-model="shellInput" @keydown.enter="runShell()" 
                                   class="bg-transparent border-none outline-none text-indigo-300 w-full p-0 font-mono" 
                                   autofocus placeholder="...">
                        </div>
                    </div>
                </div>

                <!-- ALERTS -->
                <div class="card p-6">
                    <h3 class="text-sm font-bold text-white mb-4 uppercase tracking-wider">System Broadcast</h3>
                    <div class="flex flex-col md:flex-row gap-3">
                        <input type="text" x-model="toastText" placeholder="Pesan Toast..." 
                               class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500">
                        <button @click="exec('show_toast', toastText)" class="btn-primary px-6 py-2 rounded-lg text-sm font-bold text-white">Kirim Toast</button>
                    </div>
                    <div class="mt-4 flex gap-3">
                        <button @click="exec('play_alarm', '')" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-lg text-xs font-bold text-white uppercase tracking-widest shadow-lg shadow-red-900/20">🚨 BUNYIKAN ALARM DARURAT</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: File Explorer -->
            <div class="lg:col-span-5">
                <div class="card overflow-hidden flex flex-col shadow-2xl h-full min-h-[500px]">
                    <div class="p-4 border-b border-slate-700 bg-slate-800/30">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-white flex items-center"><span class="mr-2">📂</span> EXPLORER</h3>
                            <span class="text-[10px] text-slate-500 font-mono truncate max-w-[150px]" x-text="currentPath"></span>
                        </div>
                        <div class="flex gap-2">
                            <button @click="goUp()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-xs font-bold transition-colors">⬆️ BACK</button>
                            <button @click="loadFiles('/storage/emulated/0')" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-xs font-bold transition-colors">🏠 HOME</button>
                        </div>
                    </div>
                    
                    <!-- File List -->
                    <div class="flex-1 overflow-y-auto custom-scrollbar bg-slate-900/20">
                        <template x-if="loadingFiles">
                            <div class="p-12 text-center text-slate-500 animate-pulse italic">Scanning storage...</div>
                        </template>
                        <template x-if="!loadingFiles && files.length === 0">
                            <div class="p-12 text-center text-slate-500 italic">Folder kosong atau tidak ada izin.</div>
                        </template>
                        <template x-for="file in files" :key="file.path">
                            <div class="group flex justify-between items-center p-3 hover:bg-indigo-500/10 border-b border-slate-800/50 transition-all">
                                <div class="flex items-center cursor-pointer overflow-hidden flex-1" @click="openFile(file)">
                                    <div class="w-10 h-10 rounded-lg flex items-center justify-center mr-3 shrink-0" 
                                         :class="file.is_dir ? 'bg-indigo-500/10 text-indigo-400' : 'bg-slate-800 text-slate-400'">
                                        <span class="text-xl" x-text="file.is_dir ? '📁' : '📄'"></span>
                                    </div>
                                    <div class="truncate">
                                        <div class="text-sm font-semibold text-slate-200 truncate group-hover:text-indigo-300 transition-colors" x-text="file.name"></div>
                                        <div class="text-[10px] text-slate-500 font-mono" x-text="file.is_dir ? 'Directory' : formatSize(file.size)"></div>
                                    </div>
                                </div>
                                <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click.stop="renameFile(file)" class="p-2 text-slate-400 hover:text-white" title="Rename">✏️</button>
                                    <button @click.stop="deleteFile(file)" class="p-2 text-slate-400 hover:text-red-400" title="Delete">🗑️</button>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Footer: Upload -->
                    <div class="p-4 border-t border-slate-700 bg-slate-800/30">
                        <p class="text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Upload ke Folder Ini</p>
                        <div class="flex gap-2">
                            <input type="file" @change="handleUpload($event)" class="text-xs w-full overflow-hidden">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <div class="inline-block px-4 py-1 rounded-full border border-slate-800 bg-slate-900/50">
                <span class="text-[10px] font-bold text-slate-600 tracking-[0.2em]">RAC-JS LOCAL NODE &copy; 2026</span>
            </div>
        </footer>
    </div>

    <script>
        function app() {
            return {
                deviceInfo: {},
                battery: 0,
                terminalLines: [],
                shellInput: "",
                currentPath: "/storage/emulated/0",
                files: [],
                loadingFiles: false,
                toastText: "",
                
                async init() {
                    this.refreshInfo();
                    this.loadFiles(this.currentPath);
                    setInterval(() => this.refreshInfo(), 15000);
                },

                async refreshInfo() {
                    try {
                        const res = await fetch('/api/info');
                        this.deviceInfo = await res.json();
                        
                        const battRes = await this.execCommand('get_battery', '');
                        if (battRes.type === 'battery_level') this.battery = battRes.data;
                    } catch (e) { console.error("Info fetch failed", e); }
                },

                async execCommand(command, text) {
                    try {
                        const payload = JSON.stringify({ command, text, id: 'web_' + Math.random().toString(36).substring(7) });
                        const res = await fetch('/api/command', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: payload
                        });
                        return await res.json();
                    } catch (e) {
                        return { type: 'error', data: e.message };
                    }
                },

                async exec(cmd, arg) {
                    const res = await this.execCommand(cmd, arg);
                    if (res.type === 'error') {
                        alert("Gagal: " + res.data);
                    }
                },

                async runShell() {
                    const cmd = this.shellInput.trim();
                    if (!cmd) return;
                    
                    this.terminalLines.push({ type: 'input', text: cmd });
                    this.shellInput = "";
                    this.scrollTerm();
                    
                    const res = await this.execCommand('shell', cmd);
                    if (res.type === 'shell_output') {
                        this.terminalLines.push({ type: 'output', text: res.data });
                    } else {
                        this.terminalLines.push({ type: 'error', text: res.data });
                    }
                    this.scrollTerm();
                },

                scrollTerm() {
                    this.$nextTick(() => {
                        const container = this.$refs.termContainer;
                        container.scrollTop = container.scrollHeight;
                    });
                },

                async loadFiles(path) {
                    this.loadingFiles = true;
                    this.currentPath = path;
                    try {
                        const res = await fetch('/api/files?path=' + encodeURIComponent(path));
                        if (!res.ok) throw new Error("Permission denied");
                        this.files = await res.json();
                    } catch (e) {
                        this.files = [];
                        this.terminalLines.push({ type: 'error', text: "FS Error: " + e.message });
                    } finally {
                        this.loadingFiles = false;
                    }
                },

                openFile(file) {
                    if (file.is_dir) {
                        this.loadFiles(file.path);
                    } else {
                        window.open('/api/files?path=' + encodeURIComponent(file.path));
                    }
                },

                goUp() {
                    if (this.currentPath === "/" || this.currentPath === "" || this.currentPath === "/storage/emulated/0") return;
                    const parts = this.currentPath.split("/");
                    parts.pop();
                    const newPath = parts.join("/") || "/";
                    this.loadFiles(newPath);
                },

                async deleteFile(file) {
                    if (confirm("Hapus permanen: " + file.name + "?")) {
                        const res = await this.execCommand('rm', file.path);
                        this.loadFiles(this.currentPath);
                    }
                },

                async renameFile(file) {
                    const newName = prompt("Nama baru:", file.name);
                    if (newName && newName !== file.name) {
                        const parent = file.path.substring(0, file.path.lastIndexOf('/'));
                        const dest = parent + "/" + newName;
                        await this.execCommand('mv', file.path + "|" + dest);
                        this.loadFiles(this.currentPath);
                    }
                },

                async handleUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64Data = e.target.result.split(',')[1];
                        const destPath = this.currentPath + "/" + file.name;
                        const payload = destPath + "^^^" + base64Data;
                        
                        this.terminalLines.push({ type: 'output', text: "Uploading " + file.name + "..." });
                        const res = await this.execCommand('upload', payload);
                        this.terminalLines.push({ type: 'output', text: res.data });
                        this.loadFiles(this.currentPath);
                    };
                    reader.readAsDataURL(file);
                },

                formatSize(bytes) {
                    if (bytes === 0) return '0 B';
                    const k = 1024;
                    const sizes = ['B', 'KB', 'MB', 'GB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
                }
            }
        }
    </script>
</body>
</html>
